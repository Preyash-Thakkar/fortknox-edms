<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#131b2e" />
    <title>Fort Knox EDMS — Secure Enterprise Data System</title>

    <!-- Tailwind (CDN build) with the Stitch "Secure Enterprise Data System" design tokens -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />

    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #c6c6cd; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #76777d; }
      body { font-family: Inter, system-ui, sans-serif; }
      .font-data-mono { font-family: 'JetBrains Mono', monospace; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.4s ease-out; }
      .bg-pattern {
        background-color: #0b1220;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(86,94,116,0.25), transparent 40%),
          radial-gradient(circle at 80% 0%, rgba(19,27,46,0.6), transparent 50%),
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
      }
    </style>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              error: '#ba1a1a',
              'inverse-on-surface': '#eff1f3',
              'on-error-container': '#93000a',
              'on-tertiary-fixed': '#002113',
              'primary-fixed': '#dae2fd',
              'surface-variant': '#e0e3e5',
              'on-background': '#191c1e',
              'surface-dim': '#d8dadc',
              background: '#f7f9fb',
              'tertiary-fixed-dim': '#4edea3',
              'on-primary-fixed-variant': '#3f465c',
              'on-error': '#ffffff',
              'primary-fixed-dim': '#bec6e0',
              'secondary-fixed-dim': '#b7c8e1',
              'surface-container-lowest': '#ffffff',
              'on-primary-container': '#7c839b',
              'on-tertiary': '#ffffff',
              primary: '#131b2e',
              surface: '#f7f9fb',
              'surface-container-low': '#f2f4f6',
              'on-secondary-fixed-variant': '#38485d',
              'surface-container': '#eceef0',
              'inverse-primary': '#bec6e0',
              secondary: '#505f76',
              outline: '#76777d',
              'on-surface': '#191c1e',
              tertiary: '#006d48',
              'inverse-surface': '#2d3133',
              'error-container': '#ffdad6',
              'tertiary-fixed': '#6ffbbe',
              'secondary-container': '#d0e1fb',
              'on-secondary-container': '#54647a',
              'secondary-fixed': '#d3e4fe',
              'outline-variant': '#c6c6cd',
              'on-tertiary-container': '#009668',
              'on-secondary-fixed': '#0b1c30',
              'on-secondary': '#ffffff',
              'primary-container': '#131b2e',
              'tertiary-container': '#002113',
              'surface-bright': '#f7f9fb',
              'surface-container-highest': '#e0e3e5',
              'surface-container-high': '#e6e8ea',
              'on-tertiary-fixed-variant': '#005236',
              'surface-tint': '#565e74',
              'on-surface-variant': '#45464d',
              'on-primary': '#ffffff',
            },
            spacing: { base: '8px', xs: '4px', sm: '8px', md: '16px', lg: '24px', xl: '32px', gutter: '24px' },
            maxWidth: { 'container-max': '1440px' },
            borderRadius: { sm: '0.125rem', DEFAULT: '0.25rem', md: '0.375rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
            fontFamily: { sans: ['Inter'], 'data-mono': ['JetBrains Mono'] },
            fontSize: {
              'body-md': ['14px', { lineHeight: '20px', fontWeight: '400' }],
              'body-sm': ['13px', { lineHeight: '18px', fontWeight: '400' }],
              'body-lg': ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'label-lg': ['12px', { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '600' }],
              'label-md': ['11px', { lineHeight: '14px', fontWeight: '500' }],
              'headline-sm': ['20px', { lineHeight: '28px', fontWeight: '600' }],
              'headline-md': ['24px', { lineHeight: '32px', letterSpacing: '-0.01em', fontWeight: '600' }],
              'headline-lg': ['32px', { lineHeight: '40px', letterSpacing: '-0.02em', fontWeight: '700' }],
              'data-mono': ['13px', { lineHeight: '20px', fontWeight: '400' }],
            },
            boxShadow: { sharp: '0px 4px 6px -1px rgba(15, 23, 42, 0.1)' },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background text-on-surface">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
